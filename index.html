<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pafina de prueba</title>
</head>

<body>
    <form>
        <H1>Mi primera pagina web</H1>

        <label>Nombre: <input type="text" required placeholder="Ingrese su nombre"></label>
        <br> <br>


        <label>
            Correo: <input type="email" required placeholder="Ingresa tu correo">
        </label>
        <br> <br>

        <label>
            contrasenia: <input type="password" minlength="6" maxlength="12" required placeholder="Ingresa tu correo">
        </label>
        <br> <br>

        <label>
            Numero de telefono: <input type="tel" placeholder="Ingresa tu numero de telefono">
        </label>
        <br> <br>

        <label>
            Edad: <input type="number" min="18" max="18" required placeholder="Ingresa tu edad">
        </label>
        <br><br>
        <button type="submit">Enviar</button>
    </form>


</body>

</html>
